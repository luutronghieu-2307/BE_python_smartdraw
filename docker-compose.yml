services:
  api:
    build: .
    container_name: python-sviot-api
    network_mode: host
    env_file:
      - .env
    environment:
      ENABLE_DESKTOP_VIEWER: "true"
      DISPLAY: ${DISPLAY}
      FIREBASE_CREDENTIALS_PATH: /app/serviceAccountKey.json
      FIREBASE_DEFAULT_TOPIC: sviot-users
    volumes:
      - .:/app
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ./serviceAccountKey.json:/app/serviceAccountKey.json:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - mqtt-broker
  mqtt-broker:
    image: eclipse-mosquitto:2.0.20
    container_name: python-sviot-mqtt
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    restart: unless-stopped